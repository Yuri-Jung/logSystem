spring:
  profiles:
    active: local

---
spring:
  config:
    activate:
      on-profile: local
  application:
    name: logSystem
  
  # Datasource Configuration (Local 환경 기준)
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://127.0.0.1:3306/logdb?serverTimezone=Asia/Seoul&characterEncoding=UTF-8&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: password # 로컬 데이터베이스 비밀번호로 변경해주세요.
    hikari: # 커넥션 풀 설정
      pool-name: LogSystemHikariPool
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

# MyBatis Configuration
mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.logSystem.log.domain, com.logSystem.log.dto, com.logSystem.analysis.dto
  configuration:
    map-underscore-to-camel-case: true # 언더스코어 컬럼명을 카멜케이스로 자동 매핑
    default-statement-timeout: 30 # 쿼리 타임아웃 30초
    default-fetch-size: 100
    cache-enabled: true
    jdbc-type-for-null: null

# Logging Configuration
logging:
  level:
    root: INFO
    com.logSystem: DEBUG
    # MyBatis 실행 쿼리 및 파라미터 로깅
    com.logSystem.log.repository: TRACE
